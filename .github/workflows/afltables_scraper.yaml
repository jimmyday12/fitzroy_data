name: fetch afltables data weekly

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "0 20 * * 2"

permissions:
  contents: write

jobs:
  scrape-and-commit:
    runs-on: macOS-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - name: Install Dependencies
        run: Rscript -e 'install.packages(c("pak", "tidyverse", "here", "arrow", "cli"))'
      - name: Install fitzRoy
        run: Rscript -e 'pak::pak("jimmyday12/fitzRoy")'
      - name: Get data
        run: Rscript -e 'source(here::here("scripts", "afltables_weekly_script.R"), echo = TRUE)'
      - name: Configure Git
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
      - name: Pull latest changes
        run: |
          git pull origin main
      - name: Commit
        run: |
          git add data-raw/afl_tables_playerstats/ data-raw/player_stats/
          git commit -m 'updating weekly_data_process' || echo "No changes to commit"
          git push || echo "No changes to commit"
      - name: Upload Parquet to release
        run: |
          gh release create data --title "Data assets" --notes "Rolling release — Parquet files updated weekly by CI." 2>/dev/null || true
          gh release upload data data/afltables_player_stats.parquet --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
